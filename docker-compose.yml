services:
  # Nginx Load Balancer
  nginx:
    image: nginx:latest
    container_name: nginx_lb
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    depends_on:
      - api1
      - api2

  # FastAPI Server 1
  api1:
    build: ./backend
    container_name: fastapi_1
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  # FastAPI Server 2
  api2:
    build: ./backend
    container_name: fastapi_2
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  # Redis Queue
  redis:
    image: redis:latest
    container_name: redis_queue
    ports:
      - "6379:6379"

  # Celery Worker Service
  celery_worker:
    build: ./backend
    container_name: celery_worker
    # Use -B to run beat together with the worker
    command: celery -A app.celery_app worker -B --loglevel=info
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  celery_worker_2:
    build: ./backend
    container_name: celery_worker_2
    # Use -B to run beat together with the worker
    command: celery -A app.celery_app worker -B --loglevel=info
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
  celery_worker_3:
    build: ./backend
    container_name: celery_worker_3
    # Use -B to run beat together with the worker
    command: celery -A app.celery_app worker -B --loglevel=info
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  # PostgreSQL Shared Database
  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=db
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d db" ]
      interval: 5s
      timeout: 5s
      retries: 5
